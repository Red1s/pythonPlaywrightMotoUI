name: Playwright UI project_tests (Docker + Allure)

on:
  push:
    branches:
      - main
      - ci/github-actions
  pull_request:
    branches:
      - main

# EXPLICITLY GRANTING RECORDING RIGHTS
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1 Get the code
      - name: Checkout repository
        uses: actions/checkout@v5

      # 2 Run project_tests via docker-compose
      - name: Run UI project_tests via docker-compose
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN: ${{ secrets.LOGIN }}
          PASSWORD: ${{ secrets.PASSWORD }}
          EMAIL_FOR_SEND_TEST: ${{ secrets.EMAIL_FOR_SEND_TEST }}
        run: |
          docker compose up --build --exit-code-from regression || true

      - name: Prepare Allure directories
        if: always()
        run: |
          mkdir -p allure-results allure-report 
          chmod -R a+rwx allure-report

      # Checkout gh-pages branch to restore Allure history
      - name: Checkout gh-pages for Allure history
        if: always()
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      # Allow GitHub Actions to write to allure-results
      - name: Fix permissions for allure-results
        if: always()
        run: |
          sudo chmod -R 777 allure-results || true

      # Restore Allure history (if exists)
      - name: Restore Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* allure-results/history/
          fi

      # Prepare Allure report directory
      - name: Prepare Allure report directory
        if: always()
        run: |
          mkdir -p allure-report
          chmod -R a+rwx allure-report

      # Добавляем только дату и время для графика Trend
      - name: Add Date and Time to Allure Trend
        if: always()
        run: |
          # Получаем текущую дату и время
          CURRENT_DATE=$(date +'%d.%m.%Y %H:%M')
          
          # Записываем её в настройки Allure
          cat <<EOF > allure-results/executor.json
          {
            "buildName": "${CURRENT_DATE}",
            "buildOrder": ${GITHUB_RUN_NUMBER}
          }
          EOF

      # Generate Allure report from allure-results
      - name: Generate Allure report
        if: always()
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/allure-results:/allure-results \
            -v ${{ github.workspace }}/allure-report:/allure-report \
            frankescobar/allure-docker-service \
            allure generate /allure-results --clean -o /allure-report

      # Deploy Allure in GitHub Pages
      - name: Deploy Allure to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: true